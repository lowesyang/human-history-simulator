name: Validate Community Events

on:
  pull_request:
    paths:
      - "public/community-events/**"
  push:
    paths:
      - "public/community-events/**"

jobs:
  validate:
    name: Check naming conventions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tsx
        run: npm install -g tsx

      - name: Validate community events
        run: npx tsx scripts/validate-community-events.ts
